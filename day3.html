<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dzień 3 – Rzym</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1eb;
      color: #222;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 40px;
    }

    .hero p {
      margin-top: 10px;
      color: #555;
      font-size: 18px;
    }

    .back {
      display: inline-block;
      margin-top: 16px;
      color: #8a1c1c;
      text-decoration: none;
      font-weight: bold;
    }

    .cards {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 20px;
      display: grid;
      gap: 24px;
    }

    .card {
      position: relative;
      display: block;
      height: 240px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: none;
      opacity: 1;
    }

    .overlay {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      padding: 0;
      background: none;
      display: block;
    }

    .label {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 3px 10px rgba(0,0,0,0.55);
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Dzień 3</h1>
    <p>Wybierz sekcję</p>
    <a class="back" href="index.html">← Powrót do strony głównej</a>
  </section>

  <section class="cards">
    <a class="card" href="day3-map.html">
      <img src="day3-link-map.jpg" alt="Mapa dnia 3">
      <div class="overlay">
        <div class="label">Mapa</div>
      </div>
    </a>

    <a class="card" href="day3-addresses.html">
      <img src="day3-link-addresses.jpg" alt="Adresy dnia 3">
      <div class="overlay">
        <div class="label">Adresy</div>
      </div>
    </a>

    <a class="card" href="day3-restaurants.html">
      <img src="day3-link-restaurants.jpg" alt="Restauracje dnia 3">
      <div class="overlay">
        <div class="label">Restauracje</div>
      </div>
    </a>

    <a class="card" href="trains.html">
      <img src="day3-commute.jpg" alt="Dojazd dnia 3">
      <div class="overlay">
        <div class="label">Metro / Kolej</div>
      </div>
    </a>
  </section>
</body>
</html>
