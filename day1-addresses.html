<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dzień 1 — Adresy w Rzymie</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0a0c;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .topnav {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
      font-size: 0.9rem;
    }

    .topnav a {
      color: #94a3b8;
      text-decoration: none;
      transition: color 0.3s;
    }

    .topnav a:hover { color: #f87171; }

    .hero {
      text-align: center;
      margin-bottom: 50px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin: 0 0 10px;
      background: linear-gradient(to right, #f87171, #fb923c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .list { display: grid; gap: 20px; }

    .card {
      background: rgba(23, 27, 34, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: rgba(248, 113, 113, 0.3);
      transform: translateY(-5px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
    }

    .place-title { margin: 0 0 15px; font-size: 1.25rem; }
    .place-title a { color: #fff; text-decoration: none; display: flex; align-items: center; }
    
    .meta { margin: 6px 0; font-size: 0.95rem; display: flex; align-items: flex-start; }
    .label { 
      font-weight: 600; 
      color: #f87171; 
      min-width: 90px;
      display: inline-block;
    }

    .site-link { color: #fb923c; text-decoration: none; font-weight: 600; }
    .muted { color: #64748b; font-style: italic; }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="topnav">
      <a href="index.html">← Powrót</a>
      <a href="day1.html">Dzień 1</a>
    </nav>

    <header class="hero">
      <h1>Rzymski Plan</h1>
      <p>Kliknij w miejsce, aby otworzyć je na Mapach Google</p>
    </header>

    <section class="list">
      <article class="card">
        <h2 class="place-title">
          <a href="#">1. Stacja Roma Termini</a>
        </h2>
        <div class="meta"><span class="label">Adres:</span> <span>Piazza dei Cinquecento, 00185 Roma</span></div>
        <div class="meta"><span class="label">Opis:</span> <span>Przyjazd pociągiem z Anzio.</span></div>
      </article>
      
      </section>
  </div>
</body>
</html>
