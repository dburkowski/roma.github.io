<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rzym – plan zwiedzania</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f3f3f3;
    }

    .hero {
      text-align: center;
      padding: 50px 20px 30px;
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
      color: #ffffff;
    }

    .hero p {
      margin-top: 12px;
      font-size: 18px;
      color: #b8bec8;
    }

    .cards {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      display: block;
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      background: #1a1d24;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.55);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.88);
    }

    .overlay {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      background: none;
    }

    .label {
      font-size: 30px;
      font-weight: bold;
      line-height: 1.1;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.75);
    }

    .sub {
      margin-top: 8px;
      font-size: 15px;
      color: #f1f1f1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.75);
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Rzym – plan zwiedzania</h1>
    <p>Wybierz dzień</p>
  </section>

  <section class="cards">
    <a class="card" href="day1.html">
      <img src="home-day1.jpg" alt="Dzień 1">
      <div class="overlay">
        <div class="label">Dzień 1</div>
        <div class="sub">Mapa, adresy i restauracje</div>
      </div>
    </a>

    <a class="card" href="day2.html">
      <img src="home-day2.jpg" alt="Dzień 2">
      <div class="overlay">
        <div class="label">Dzień 2</div>
        <div class="sub">Mapa, adresy i restauracje</div>
      </div>
    </a>

    <a class="card" href="day3.html">
      <img src="home-day3.jpg" alt="Dzień 3">
      <div class="overlay">
        <div class="label">Dzień 3</div>
        <div class="sub">Mapa, adresy i restauracje</div>
      </div>
    </a>

    <a class="card" href="help.html">
      <img src="help.jpg" alt="Pomoc">
      <div class="overlay">
        <div class="label">POMOC</div>
        <div class="sub">Numery alarmowe i ważne kontakty</div>
      </div>
    </a>
  </section>
</body>
</html>
