<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dzień 2 – Rzym</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f1eb;
      color: #222;
    }
    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .hero h1 {
      margin: 0;
      font-size: 40px;
    }
    .hero p {
      margin-top: 10px;
      color: #555;
      font-size: 18px;
    }
    .back {
      display: inline-block;
      margin-top: 16px;
      color: #8a1c1c;
      text-decoration: none;
      font-weight: bold;
    }
    .cards {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 20px;
      display: grid;
      gap: 24px;
    }
    .card {
      position: relative;
      display: block;
      height: 240px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      color: white;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.72), rgba(0,0,0,0.15));
      display: flex;
      align-items: end;
      padding: 24px;
    }
    .label {
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Dzień 2</h1>
    <p>Wybierz sekcję</p>
    <a class="back" href="index.html">← Powrót do strony głównej</a>
  </section>

  <section class="cards">
    <a class="card" href="day2-map.html">
      <img src="day2-link-map.jpg" alt="Mapa dnia 2">
      <div class="overlay">
        <div class="label">Mapa</div>
      </div>
    </a>

    <a class="card" href="day2-addresses.jpg">
      <img src="day2-link-addresses.jpg" alt="Adresy dnia 2">
      <div class="overlay">
        <div class="label">Adresy</div>
      </div>
    </a>

    <a class="card" href="day2-restaurants.jpg">
      <img src="day2-link-restaurants.jpg" alt="Restauracje dnia 2">
      <div class="overlay">
        <div class="label">Restauracje</div>
      </div>
    </a>
  </section>
</body>
</html>
