<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dzień 1 – Rzym</title>
  <style>
    * { box-sizing: border-box; }

    body {
      color-scheme: dark;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1115;
      color: #f3f3f3;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 40px;
    }

    .hero p {
      margin-top: 10px;
      color: #b8bec8;
      font-size: 18px;
    }

    .back {
      display: inline-block;
      margin-top: 16px;
      color: #ff8f8f;
      text-decoration: none;
      font-weight: bold;
    }

    .cards {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 20px;
      display: grid;
      gap: 24px;
    }

    .card {
      display: block;
      height: 240px;
      border-radius: 18px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 14px 32px rgba(0,0,0,0.50);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.9);
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Dzień 1</h1>
    <p>Wybierz sekcję</p>
    <a class="back" href="index.html">← Powrót do strony głównej</a>
  </section>

  <section class="cards">
    <a class="card" href="day1-map.html">
      <img src="day1-link-map.jpg" alt="Mapa dnia 1">
    </a>

    <a class="card" href="day1-addresses.html">
      <img src="day1-link-addresses.jpg" alt="Adresy dnia 1">
    </a>

    <a class="card" href="day1-restaurants.html">
      <img src="day1-link-restaurants.jpg" alt="Restauracje dnia 1">
    </a>

    <a class="card" href="trains.html">
      <img src="day1-commute.jpg" alt="Dojazd dnia 1">
    </a>

    <a class="card" href="day1-tickets.html">
      <img src="day1-tickets.jpg" alt="Bilety dnia 1">
    </a>
  </section>
</body>
</html>
